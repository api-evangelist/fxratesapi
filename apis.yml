aid: fxratesapi
url: https://raw.githubusercontent.com/api-evangelist/fxratesapi/refs/heads/main/apis.yml
name: FXRatesAPI
kind: company
description: FXRatesAPI is a foreign exchange rates REST API that delivers real-time
  and historical currency exchange rates for 185+ fiat currencies plus major
  cryptocurrencies and precious metals. It exposes JSON endpoints for the latest
  rates, historical rates for any past date, time-series ranges, currency
  conversion, and a currencies list. A limited tier is usable without an API key;
  higher request quotas, more frequent updates, and additional base-currency
  switching are unlocked with a paid API key passed via the api_key query
  parameter or an Authorization Bearer header.
