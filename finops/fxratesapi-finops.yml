meters:
- name: monthly_requests
  description: API requests counted against the subscription's monthly quota.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - endpoint
principles:
- name: Visibility
  description: Track monthly request consumption against the plan quota in the FXRatesAPI account usage page.
- name: Allocation
  description: Issue separate API keys per workload/team to attribute request consumption.
- name: Optimization
  description: Cache latest and currency-list responses; batch currencies in a single request; use time-series for ranges instead of many historical calls; right-size the subscription tier to actual monthly volume.
- name: Accountability
  description: Review monthly request burn against the plan quota to avoid overage or forced upgrades.
