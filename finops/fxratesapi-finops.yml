description: >-
  FinOps view of FXRatesAPI spend. FXRatesAPI bills on a subscription model
  keyed to a monthly request quota (free tier plus paid tiers), not on
  per-request usage-based metering. Cost is driven by which tier an account
  subscribes to and how much of the monthly request allowance is consumed.
  Exact per-tier prices are not reconciled in this artifact (see plans).
notes: >-
  reconciled=false. Per-tier prices and quotas must be verified against
  fxratesapi.com/pricing during reconciliation. Modeled as subscription /
  recurring pricing based on the observed free-plus-paid-tier structure.
